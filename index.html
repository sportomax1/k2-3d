<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <meta name="description" content="K2 3D open-world character playground." />
    <title>K2 3D Playground</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="Interactive 3D open-world playground"></canvas>

      <header class="topbar">
        <div>
          <p class="eyebrow">K2 GAME LAB</p>
          <h1>Choose Your Ride</h1>
        </div>
        <div class="status" id="status">Building world…</div>
      </header>

      <aside class="character-panel" aria-label="Choose playable character">
        <div class="panel-title">Playable Characters</div>
        <div class="character-grid">
          <button class="character-card active" type="button" data-character="macho" aria-pressed="true"><span class="avatar">💪</span><span>Macho</span><small>Power run</small></button>
          <button class="character-card" type="button" data-character="dog" aria-pressed="false"><span class="avatar">🐕</span><span>Dog</span><small>Sprint + wag</small></button>
          <button class="character-card" type="button" data-character="model" aria-pressed="false"><span class="avatar">👠</span><span>Model</span><small>Runway stride</small></button>
          <button class="character-card" type="button" data-character="truck" aria-pressed="false"><span class="avatar">🛻</span><span>Truck</span><small>Drive + wheels</small></button>
        </div>
      </aside>

      <aside class="help-panel" id="help-panel">
        <button class="panel-toggle" id="help-toggle" type="button" aria-expanded="true">Controls</button>
        <div class="help-content">
          <div><kbd>WASD</kbd><span>Move</span></div>
          <div><kbd>Shift</kbd><span>Run / boost</span></div>
          <div><kbd>Space</kbd><span>Jump / hop</span></div>
          <div><kbd>E</kbd><span>Special action</span></div>
          <div><kbd>Drag</kbd><span>Orbit camera</span></div>
          <div><kbd>Wheel</kbd><span>Zoom</span></div>
        </div>
      </aside>

      <div class="zone-chip" id="zone-chip">Sunrise Meadow</div>

      <div class="action-bar" aria-label="Character actions">
        <button id="wave-button" type="button">✨ Special</button>
        <button id="jump-button" class="primary" type="button">↑ Jump</button>
        <button id="reset-button" type="button">↺ Reset</button>
      </div>

      <div class="joystick-zone" id="joystick-zone" aria-label="Touch movement joystick">
        <div class="joystick-base"><div class="joystick-knob" id="joystick-knob"></div></div>
      </div>

      <div class="loading-screen" id="loading-screen">
        <div class="loader-orbit"><span></span></div>
        <strong>Building your playground</strong>
        <small>Creating four animated playable characters</small>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
